name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        shell: pwsh
        run: |
          if ($IsWindows) {
            Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Version 10.0.301
            Add-Content $env:GITHUB_PATH "$env:LocalAppData\Microsoft\dotnet"
          } else {
            curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --version 10.0.301
            Add-Content $env:GITHUB_PATH "$HOME/.dotnet"
          }

      - name: Restore
        run: dotnet restore hokai.slnx --locked-mode

      - name: Build
        run: dotnet build hokai.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test hokai.slnx -c Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFilePrefix=test-results"

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            tests/**/TestResults/**/*
            tests/**/*.trx

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          ! grep -rI --include='*.cs' --include='*.json' --include='*.md' \
            -E '(password|secret|key|token)\s*[=:]\s*"[^"]{8,}"' \
            src/ tests/ \
            --exclude='SmtpMailSenderTests.cs' \
            || { echo "See AGENTS.md §6 for exclusions."; false; }

      - name: Verify no appsettings.Development.json
        run: |
          test ! -f src/Hokai/appsettings.Development.json || \
            { echo "appsettings.Development.json must not be tracked."; exit 1; }

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: hokai-ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            APP_VERSION=0.0.0-ci

      - name: Smoke test image
        run: |
          docker run --rm hokai-ci-test --version 2>&1 | tee /tmp/docker-ci-version.txt
          grep -qF "0.0.0-ci" /tmp/docker-ci-version.txt || {
            echo "Version mismatch in CI Docker image"
            exit 1
          }
          docker run --rm hokai-ci-test --help > /dev/null 2>&1

  native-aot:
    name: NativeAOT (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        shell: pwsh
        run: |
          if ($IsWindows) {
            Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
            ./dotnet-install.ps1 -Version 10.0.301
            Add-Content $env:GITHUB_PATH "$env:LocalAppData\Microsoft\dotnet"
          } else {
            curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --version 10.0.301
            Add-Content $env:GITHUB_PATH "$HOME/.dotnet"
          }

      - name: Restore
        run: dotnet restore hokai.slnx --locked-mode

      - name: Build
        run: dotnet build hokai.slnx -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test hokai.slnx -c Release --no-build

      - name: Publish AOT
        shell: bash
        run: |
          dotnet publish src/Hokai/Hokai.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained \
            --no-restore -warnaserror \
            -o publish-aot

      - name: Smoke test
        run: |
          set -euo pipefail
          EXE="publish-aot/hokai"
          test -f "$EXE" || { echo "Missing executable: $EXE"; exit 1; }
          chmod +x "$EXE" 2>/dev/null || true
          "$EXE" --help > /dev/null 2>&1
          "$EXE" --version > /dev/null 2>&1
        shell: bash

  required:
    name: CI / required
    if: always()
    needs: [build-test, security, docker, native-aot]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          failures=""
          if [[ "${{ needs.build-test.result }}" != "success" ]]; then
            failures="$failures build-test"
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            failures="$failures security"
          fi
          if [[ "${{ needs.docker.result }}" != "success" ]]; then
            failures="$failures docker"
          fi
          if [[ "${{ needs.native-aot.result }}" != "success" ]]; then
            failures="$failures native-aot"
          fi
          if [[ -n "$failures" ]]; then
            echo "Failed jobs:$failures"
            exit 1
          fi
          echo "All required jobs passed."
